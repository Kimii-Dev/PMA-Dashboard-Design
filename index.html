<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aerodyne - AI Talent Acquisition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-left">
            <div class="brand-showcase">
                <h1>AERODYNE</h1>
                <p>Next-Generation AI Talent Acquisition</p>
                <div class="tech-stack">
                    <span>NLP Parsing</span> • <span>LSTM Context</span> • <span>Predictive Analytics</span>
                </div>
            </div>
        </div>
        <div class="login-right">
            <div class="login-form-wrapper">
                <h2>Welcome Back</h2>
                <p class="subtitle">Secure access to the HR Dashboard</p>
                <form id="loginForm">
                    <div class="input-group">
                        <label for="username">Corporate ID / Email</label>
                        <input type="text" id="username" placeholder="name@aerodyne.com" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary ripple">Secure Login &rarr;</button>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
