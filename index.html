<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aerodyne - AI Talent Acquisition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <div class="brand-logo">AERODYNE</div>
                <p>AI Talent Acquisition System</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Corporate ID / Email</label>
                    <input type="text" id="username" placeholder="Enter your credentials" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Secure Login</button>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
