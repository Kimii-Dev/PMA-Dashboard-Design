<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recruitment Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-card">
        <h1>AI Recruitment System</h1>
        <p style="margin-bottom: 20px; color: #94a3b8; font-size: 14px;">Smart HR Dashboard</p>

        <div class="form-group" style="text-align: left;">
            <input type="text" id="username" placeholder="Username">
        </div>

        <div class="form-group password-box" style="text-align: left;">
            <input type="password" id="password" placeholder="Password">
            <span onclick="togglePassword()">👁</span>
        </div>

        <button class="btn-primary" onclick="login()" style="margin-top: 10px;">Login</button>

        <p id="msg"></p>
    </div>

    <script src="app.js"></script>
</body>
</html>
